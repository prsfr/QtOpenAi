name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Check formatting
        run: >
          git ls-files '*.cpp' '*.h'
          | xargs clang-format --dry-run --Werror

  build-and-test:
    name: ${{ matrix.os }} / Qt ${{ matrix.qt_version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        qt_version: ["6.11.0"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Diagnostic: ask the runner (which has full access to download.qt.io)
      # what Qt versions/architectures are actually published for Windows, to
      # explain why aqt cannot locate 6.11.0 there while Linux/macOS install it.
      - name: Diagnose available Qt (Windows)
        if: runner.os == 'Windows'
        continue-on-error: true
        shell: pwsh
        run: |
          python -m pip install --upgrade aqtinstall
          Write-Host "=== all desktop versions ==="
          python -m aqt list-qt windows desktop
          Write-Host "=== 6.11 series ==="
          python -m aqt list-qt windows desktop --spec "6.11"
          Write-Host "=== latest 6.11 ==="
          python -m aqt list-qt windows desktop --spec "6.11" --latest-version
          Write-Host "=== arches for 6.11.0 ==="
          python -m aqt list-qt windows desktop --arch 6.11.0

      - name: Install Qt ${{ matrix.qt_version }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt_version }}
          cache: true

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DQTOPENAI_BUILD_TESTS=ON
          -DQTOPENAI_BUILD_EXAMPLES=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        working-directory: build
        run: ctest --build-config Release --output-on-failure
